services:
  - type: web
    name: medai-diagnostics-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && python train_symptom_model.py && python train_skin_model.py
    startCommand: cd backend && gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: GROQ_API_KEY
        sync: false
