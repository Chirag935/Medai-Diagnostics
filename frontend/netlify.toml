[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NEXT_PUBLIC_API_URL = "https://medai-backend.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"

[context.deploy-preview.environment]
  NODE_VERSION = "20"
